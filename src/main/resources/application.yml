server:
  port: 8083 # C?ng m?c ??nh cho Booking Service [cite: 190]

spring:
  application:
    name: booking-service

  # C?u h�nh MariaDB (booking_db)
  datasource:
    url: jdbc:mariadb://localhost:3306/booking_db
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # C?u h�nh RabbitMQ (Broker) [cite: 137, 192]
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  instance:
    hostname: 172.20.34.136       # Ép đè luôn cái tên mshome.net
    ip-address: 172.20.34.136     # Khai báo IP thật
    prefer-ip-address: true
    instance-id: ${eureka.instance.ip-address}:${spring.application.name}:${server.port} # Hiện cho đẹp trên Eureka
  client:
    service-url:
      defaultZone: http://172.20.34.113:8761/eureka/